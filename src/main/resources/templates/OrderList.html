<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Order History for <span th:text="${author}"></span></h2>
    <table class="table table-striped mt-3">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Order Time</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.orderTime}"></td>
            <td th:text="${order.status}"></td>
            <td>
                <a th:href="@{/order/pay/{id}(id=${order.id})}" class="btn btn-sm btn-success">Pay Order</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="4" class="text-center">No orders found for this author.</td>
        </tr>
        </tbody>
    </table>
    <a href="/order/history" class="btn btn-secondary">Back to History Search</a>
</div>
</body>
</html>
