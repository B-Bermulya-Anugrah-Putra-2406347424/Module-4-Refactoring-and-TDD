<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Payment Request Submitted!</h2>
    <div class="alert alert-success mt-3">
        Your payment request has been successfully created.
    </div>
    <p><strong>Your Payment ID:</strong> <span th:text="${paymentId}"></span></p>

    <div class="mt-4">
        <a th:href="@{/payment/detail/{id}(id=${paymentId})}" class="btn btn-primary">Check Payment Status</a>
        <a href="/order/history" class="btn btn-secondary">Back to Order History</a>
    </div>
</div>
</body>
</html>
