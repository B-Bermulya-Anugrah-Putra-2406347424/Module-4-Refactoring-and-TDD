<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Payment List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>All Payments (Admin)</h2>
    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>Payment ID</th>
            <th>Method</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.id}"></td>
            <td th:text="${payment.method}"></td>
            <td th:text="${payment.status}"></td>
            <td>
                <a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}" class="btn btn-sm btn-info">Review</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(payments)}">
            <td colspan="4" class="text-center">No payments found.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
