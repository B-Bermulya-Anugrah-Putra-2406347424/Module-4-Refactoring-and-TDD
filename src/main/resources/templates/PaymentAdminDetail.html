<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Review Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Review Payment</h2>
    <p><strong>Payment ID:</strong> <span th:text="${paymentId}"></span></p>
    <div th:if="${payment != null}">
        <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
        <p><strong>Current Status:</strong> <span th:text="${payment.status}"></span></p>

        <form th:action="@{/payment/admin/set-status/{id}(id=${paymentId})}" method="post" class="mt-3">
            <input type="hidden" name="status" value="SUCCESS">
            <button type="submit" class="btn btn-success">Accept Payment</button>
        </form>

        <form th:action="@{/payment/admin/set-status/{id}(id=${paymentId})}" method="post" class="mt-2">
            <input type="hidden" name="status" value="REJECTED">
            <button type="submit" class="btn btn-danger">Reject Payment</button>
        </form>
    </div>
    <br>
    <a href="/payment/admin/list" class="btn btn-secondary">Back to List</a>
</div>
</body>
</html>
