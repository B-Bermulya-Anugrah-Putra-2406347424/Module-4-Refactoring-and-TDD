<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Payment Details</h2>
    <p><strong>Payment ID:</strong> <span th:text="${paymentId}"></span></p>
    <div th:if="${payment != null}">
        <p><strong>Method:</strong> <span th:text="${payment.method}"></span></p>
        <p><strong>Status:</strong> <span th:text="${payment.status}"></span></p>
    </div>
    <div th:if="${payment == null}">
        <p class="text-danger">Payment not found!</p>
    </div>
    <a href="/order/history" class="btn btn-secondary">Back to Orders</a>
</div>
</body>
</html>
