<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Pay Order ID: <span th:text="${orderId}"></span></h2>
    <form th:action="@{/order/pay/{id}(id=${orderId})}" method="post" class="mt-4">
        <div class="mb-3">
            <label class="form-label"><strong>Payment Method:</strong></label>
            <select name="method" class="form-select" required>
                <option value="VOUCHER">Voucher</option>
                <option value="BANK_TRANSFER">Bank Transfer</option>
            </select>
        </div>

        <div class="mb-3 mt-4">
            <label class="form-label"><em>Voucher Code (If using Voucher):</em></label>
            <input type="text" name="voucherCode" class="form-control" placeholder="ESHOP...">
        </div>

        <div class="mb-3">
            <label class="form-label"><em>Bank Name (If using Bank Transfer):</em></label>
            <input type="text" name="bankName" class="form-control" placeholder="BCA / Mandiri / dll">
        </div>

        <div class="mb-3">
            <label class="form-label"><em>Reference Code (If using Bank Transfer):</em></label>
            <input type="text" name="referenceCode" class="form-control">
        </div>

        <button type="submit" class="btn btn-success mt-3">Submit Payment</button>
        <a href="/order/history" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>
</body>
</html>
